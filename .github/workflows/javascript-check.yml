name: JavaScript checks

on:
  workflow_dispatch:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  javascript:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -uo pipefail
          failures=0

          while IFS= read -r -d '' file; do
            echo "Checking $file"
            if ! node --check "$file"; then
              echo "::error file=$file::Erreur de syntaxe JavaScript"
              failures=$((failures + 1))
            fi
          done < <(find src test -type f -name '*.js' -print0)

          if [ "$failures" -ne 0 ]; then
            echo "$failures fichier(s) JavaScript invalide(s)."
            exit 1
          fi

      - name: Run JavaScript tests
        run: npm test
